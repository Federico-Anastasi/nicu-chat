<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#0a1628" />
<title>Crea la tua toy-AI — Nicu</title>
<meta name="description" content="Nicu è il primo. Dicci che personaggio vorresti e ti avvisiamo quando potrai crearne uno tutto tuo." />
<link rel="canonical" href="https://nicu.chat/crea" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Vuoi un amico come Nicu, ma tutto tuo?" />
<meta property="og:description" content="Nicu è il primo. Dicci che personaggio vorresti e ti avvisiamo quando potrai crearne uno tutto tuo." />
<meta property="og:url" content="https://nicu.chat/crea" />
<meta property="og:image" content="https://nicu.chat/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://nicu.chat/og.png" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a1628;
    color: #d7e3ee;
    font-family: system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 48px 20px 80px; display: flex; justify-content: center; }
  main { width: 100%; max-width: 560px; }
  .back-link {
    font-size: 0.85rem;
    color: #7a9bb5;
    text-decoration: none;
  }
  .back-link:hover { color: #f09040; }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #f5f5f5;
    margin: 28px 0 10px;
  }
  .subtitle {
    font-size: 0.98rem;
    color: #b7c7d6;
    margin-bottom: 8px;
  }
  .rule {
    border: 0;
    border-top: 1px solid #1a3a5c;
    margin: 24px 0 32px;
  }
  form { display: flex; flex-direction: column; gap: 14px; }
  label {
    font-size: 0.85rem;
    color: #b7c7d6;
    margin-bottom: 4px;
    display: block;
  }
  input[type="email"], textarea {
    width: 100%;
    background: #0f2138;
    border: 1px solid #1a3a5c;
    border-radius: 10px;
    color: #f5f5f5;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 12px 14px;
    resize: vertical;
  }
  input[type="email"]:focus, textarea:focus {
    outline: none;
    border-color: #f09040;
  }
  textarea { min-height: 88px; }
  .website-field { display: none; }
  button {
    margin-top: 4px;
    background: #f09040;
    color: #0a1628;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    padding: 13px 18px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover { background: #e86a2b; }
  button:disabled {
    background: #4a5a6a;
    color: #b7c7d6;
    cursor: not-allowed;
  }
  .fine-print {
    font-size: 0.8rem;
    color: #7a9bb5;
    margin-top: 2px;
  }
  .fine-print a { color: #f09040; }
  a { color: #f09040; text-decoration: underline; }
  a:hover { color: #e86a2b; }
  strong { color: #f5f5f5; font-weight: 600; }
  #wl-message {
    font-size: 1rem;
    color: #f5f5f5;
    display: none;
  }
  #wl-error {
    font-size: 0.85rem;
    color: #f0a070;
    margin-top: 6px;
    display: none;
  }
</style>
</head>
<body>
<main>
  <a class="back-link" href="/">&larr; Torna a Nicu</a>
  <h1>Vuoi un amico come Nicu, ma tutto tuo?</h1>
  <p class="subtitle">
    Nicu è il primo. Stiamo preparando il modo di creare il <strong>TUO</strong> personaggio:
    dicci chi vorresti e ti avvisiamo quando si potrà.
  </p>
  <hr class="rule" />

  <form id="wl-form">
    <div>
      <label for="wl-email">La tua email</label>
      <input type="email" id="wl-email" name="email" required autocomplete="email" placeholder="tu@esempio.com" />
    </div>
    <div>
      <label for="wl-wish">Che personaggio vorresti? (opzionale)</label>
      <textarea id="wl-wish" name="wish" placeholder="Es: un nonno siciliano che racconta storie di pesca..."></textarea>
    </div>
    <!-- honeypot: campo invisibile ai visitatori, i bot lo compilano -->
    <div class="website-field">
      <label for="wl-website">Sito web</label>
      <input type="text" id="wl-website" name="website" tabindex="-1" autocomplete="off" />
    </div>
    <button type="submit" id="wl-submit">Avvisami</button>
    <p class="fine-print">
      Iscrivendoti accetti la <a href="/privacy.html">privacy</a>. Zero spam: ti scriviamo solo per questo.
    </p>
    <p id="wl-error"></p>
  </form>
  <p id="wl-message"></p>
</main>
<script>
(function () {
  var form = document.getElementById('wl-form');
  var submitBtn = document.getElementById('wl-submit');
  var errorEl = document.getElementById('wl-error');
  var messageEl = document.getElementById('wl-message');

  form.addEventListener('submit', function (ev) {
    ev.preventDefault();
    errorEl.style.display = 'none';
    errorEl.textContent = '';

    var email = document.getElementById('wl-email').value.trim();
    var wish = document.getElementById('wl-wish').value.trim();
    var website = document.getElementById('wl-website').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Un attimo...';

    fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, wish: wish, website: website, ua: navigator.userAgent }),
    })
      .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
      .then(function (result) {
        if (result.data && result.data.ok) {
          form.style.display = 'none';
          messageEl.textContent = 'Ci sei, ' + email + '! Ti avvisiamo noi, parola di Nicu.';
          messageEl.style.display = 'block';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Avvisami';
          errorEl.textContent = 'Mmh, controlla l\'email: qualcosa non torna.';
          errorEl.style.display = 'block';
        }
      })
      .catch(function () {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Avvisami';
        errorEl.textContent = 'Non ci arriva la risposta. Riprova tra un attimo.';
        errorEl.style.display = 'block';
      });
  });
})();
</script>
</body>
</html>
